/* 3D mouse-tilt wrapper. Composes with a baseRotate (the resting tilt of the card). */
function Tilt({ children, className = "", style = {}, max = 14, scale = 1.04, baseRotate = 0, lift = 14 }) {
  const ref = useRef(null);
  const rafRef = useRef(0);
  const [tx, setTx] = useState({
    rx: 0, ry: 0, s: 1, t: "transform 600ms cubic-bezier(.2,.8,.2,1)",
  });

  const onMove = (e) => {
    const el = ref.current;
    if (!el) return;
    const r = el.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width;
    const y = (e.clientY - r.top) / r.height;
    cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => {
      setTx({
        rx: -(y - 0.5) * 2 * max,
        ry: (x - 0.5) * 2 * max,
        s: scale,
        t: "transform 90ms ease-out",
      });
    });
  };
  const onLeave = () => {
    setTx({ rx: 0, ry: 0, s: 1, t: "transform 600ms cubic-bezier(.2,.8,.2,1)" });
  };

  const transform =
    `perspective(900px) rotateX(${tx.rx}deg) rotateY(${tx.ry}deg) rotateZ(${baseRotate}deg) translateZ(${(tx.s - 1) * 400}px) scale(${tx.s})`;

  return (
    <div
      ref={ref}
      onMouseMove={onMove}
      onMouseLeave={onLeave}
      className={className}
      style={{
        ...style,
        transform,
        transformStyle: "preserve-3d",
        transition: tx.t,
        willChange: "transform",
      }}
    >
      {children}
    </div>
  );
}
